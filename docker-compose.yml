services:
  app:
    build: .
    container_name: app
    ports:
      - "8000:8000"
    depends_on:
      - rabbitmq
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    container_name: worker
    depends_on:
      - rabbitmq
    command: python -u worker.py   # 🔥 IMPORTANT (-u for logs)
    restart: always               # 🔥 auto-restart if crash

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"